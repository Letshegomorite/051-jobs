<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Search jobs in South Africa with advanced filters and real-time search.">
    <title>Jobs | 051 Jobs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Space+Grotesk:wght@500&display=swap');
        .tail-container * { font-family: 'Inter', system_ui, sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="tail-container">
    <nav class="bg-white border-b sticky top-0 z-50 shadow-sm">
        <div class="max-w-screen-2xl mx-auto px-6">
            <div class="h-16 flex items-center justify-between">
                <a href="index.html" class="flex items-center gap-x-2">
                    <div class="w-9 h-9 bg-[#00d4ff] text-white rounded-2xl flex items-center justify-center text-2xl font-bold logo-font">051</div>
                    <span class="text-3xl font-semibold tracking-[-1px] logo-font text-gray-900">Jobs</span>
                </a>
                <div class="hidden md:flex items-center gap-x-8 font-medium text-sm">
                    <a href="jobs.html" class="text-[#00d4ff]">Jobs</a>
                    <a href="bursaries.html">Bursaries</a>
                    <a href="courses.html">Short Courses</a>
                    <a href="about.html">About</a>
                    <a href="contact.html">Contact</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-screen-2xl mx-auto px-6 py-12">
        <h1 class="text-4xl font-semibold mb-8">All Jobs</h1>

        <div class="mb-8 bg-white rounded-3xl p-2 shadow-sm">
            <div class="flex items-center px-6 py-4">
                <i class="fa-solid fa-magnifying-glass text-[#00d4ff] mr-4"></i>
                <input id="jobsSearchInput" type="text" placeholder="Search by job title, company or keyword..." 
                       onkeyup="debouncedJobSearch()" class="flex-1 outline-none text-lg">
            </div>
        </div>

        <div class="flex flex-col lg:flex-row gap-8">
            <div class="lg:w-72">
                <div class="bg-white rounded-3xl p-6 sticky top-6">
                    <h3 class="font-semibold mb-4">Filters</h3>
                    <div id="jobTypeFilters" class="mb-8 space-y-3"></div>
                    <div id="jobLocationFilters" class="space-y-3"></div>
                    <button onclick="clearJobFilters()" class="mt-6 text-[#00d4ff] text-sm hover:underline">Clear all filters</button>
                </div>
            </div>

            <div class="flex-1">
                <p id="jobCount" class="font-semibold text-2xl mb-6"></p>
                <div id="jobGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"></div>
                <div id="jobPagination" class="mt-12 flex justify-center gap-2"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
